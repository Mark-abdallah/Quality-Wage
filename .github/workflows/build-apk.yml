name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.3'
          cache: true

      - name: Regenerate Android platform files
        run: flutter create --org com.quality --platforms=android .

      - name: Set app display name to "Quality"
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="[^"]*"/android:label="Quality"/' "$MANIFEST"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/Quality.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quality-APK
          path: dist/Quality.apk
          if-no-files-found: error
